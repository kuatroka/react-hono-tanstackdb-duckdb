name: DAST

on:
  pull_request:
  schedule:
    - cron: '42 3 * * 2'

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Start production server
        env:
          NODE_ENV: production
          API_PORT: 3000
          JWT_SECRET: ci-dast-secret
          DUCKDB_PATH: /tmp/nonexistent.duckdb
        run: |
          bun api/server.ts > server.log 2>&1 &
          echo $! > server.pid
          sleep 5
      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://127.0.0.1:3000/healthz'
          fail_action: false
          artifact_name: zap-baseline-report
