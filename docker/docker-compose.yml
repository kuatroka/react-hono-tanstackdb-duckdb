services:
  zstart_postgres:
    image: mooncakelabs/pg_mooncake:latest
    shm_size: 1g
    user: postgres
    restart: always
    healthcheck:
      test: 'pg_isready -U user --dbname=postgres'
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: password
      DUCKDB_FORCE_EXECUTION: ${DUCKDB_FORCE_EXECUTION:-off}
    volumes:
      - zstart_pgdata:/var/lib/postgresql
      - /Users/yo_macbook/Documents/app_data:/app_data:ro
      - ./init/01-setup-extensions.sql:/docker-entrypoint-initdb.d/01-setup-extensions.sql:ro
      - ./init/02-create-dev-postgres-role.sql:/docker-entrypoint-initdb.d/02-create-dev-postgres-role.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
      - ./migrations/02_add_counter_quarters.sql:/docker-entrypoint-initdb.d/04-migration-counters.sql:ro
      - ./migrations/03_add_entities.sql:/docker-entrypoint-initdb.d/05-migration-entities.sql:ro
      - ./migrations/04_rollback_full_text_search.sql:/docker-entrypoint-initdb.d/06-migration-rollback.sql:ro
      - ./migrations/05_add_user_counters.sql:/docker-entrypoint-initdb.d/07-migration-user-counters.sql:ro
      - ./migrations/06_add_searches.sql:/docker-entrypoint-initdb.d/08-migration-searches.sql:ro
      - ./migrations/07_add_superinvestors_assets_periods.sql:/docker-entrypoint-initdb.d/09-migration-superinvestors.sql:ro
      - ./migrations/08_add_drilldown_function.sql:/docker-entrypoint-initdb.d/10-drilldown-function.sql:ro
      - ./migrations/0000_melted_vivisector.sql:/docker-entrypoint-initdb.d/11-migration-drizzle-bootstrap.sql:ro
      - ./migrations/0001_large_selene.sql:/docker-entrypoint-initdb.d/12-migration-drizzle-activity-pk.sql:ro
      - ./migrations/0002_oval_black_tom.sql:/docker-entrypoint-initdb.d/13-migration-drizzle-cusip-columns.sql:ro
      - ./migrations/08_add_performance_indexes.sql:/docker-entrypoint-initdb.d/14-migration-performance-indexes.sql:ro

volumes:
  zstart_pgdata:
    driver: local
