services:
  app:
    image: ${APP_IMAGE:-fintellectus-tanstackdb-app:latest}
    container_name: ${APP_CONTAINER_NAME:-fintellectus_tanstackdb_app}
    build:
      context: ../..
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_BIND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3000}
      VITE_PUBLIC_SERVER: ${APP_PUBLIC_URL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      APP_VERSION: ${APP_VERSION:-0.0.0}
      APP_GIT_COMMIT: ${APP_GIT_COMMIT:-unknown}
      APP_PROD_TAG: ${APP_PROD_TAG:-unknown}
      APP_DEPLOYED_AT: ${APP_DEPLOYED_AT:-unknown}
      JWT_SECRET: ${JWT_SECRET}
      APP_DATA_PATH: /app_data
      DUCKDB_PATH: ${DUCKDB_PATH}
      SEARCH_INDEX_PATH: ${SEARCH_INDEX_PATH}
      WEB_APP_ALERT_ENV: prod
      WEB_APP_APPRISE_PROD_URLS: ${WEB_APP_APPRISE_PROD_URLS:-}
      WEB_APP_TELEGRAM_ALERTS_ENABLED: ${WEB_APP_TELEGRAM_ALERTS_ENABLED:-true}
      WEB_APP_TELEGRAM_RUNTIME_ALERTS_ENABLED: ${WEB_APP_TELEGRAM_RUNTIME_ALERTS_ENABLED:-true}
      WEB_APP_TELEGRAM_DEPLOY_ALERTS_ENABLED: ${WEB_APP_TELEGRAM_DEPLOY_ALERTS_ENABLED:-true}
    volumes:
      - ${APP_DATA_HOST_PATH:-/opt/dev/erudio_app/app_data}:/app_data:ro
